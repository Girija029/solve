<!DOCTYPE html>
<html lang="en">
<head>
    <title>Enter Marks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .mark-input { text-transform: uppercase; }
        .invalid-mark { border-color: red !important; background: #fff0f0; }
        .error-msg { color: red; font-size: 0.78rem; margin-top: 2px; }
    </style>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white pb-0">
                <h4 class="text-primary fw-bold">📝 Data Entry</h4>
                <p class="text-muted">{{ class_name }} | {{ exam }} | <b>{{ subject }}</b></p>
            </div>
            <div class="card-body">
                <form method="POST" id="marksForm">
                    <div class="mb-3">
                        <label class="form-label fw-bold">📅 Exam Date</label>
                        <input type="date" name="exam_date" class="form-control" style="width: auto;" value="{{ existing_date }}">
                        <small class="text-muted">Set the date when this exam was conducted</small>
                    </div>
                    <table class="table table-hover table-bordered align-middle mt-3">
                        <thead class="table-dark">
                            <tr>
                                <th width="15%">Roll No</th>
                                <th>Student Name</th>
                                <th width="25%">Mark <small class="fw-normal">(0–50 or AB for Absent)</small></th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for student in students %}
                            <tr>
                                <td class="fw-bold">{{ student[1] }}</td>
                                <td>{{ student[2] }}</td>
                                <td>
                                    <input type="text" name="{{ student[0] }}"
                                        class="form-control text-center fw-bold mark-input"
                                        autocomplete="off"
                                        value="{{ existing_marks[student[0]] }}"
                                        oninput="validateMark(this)">
                                    <div class="error-msg" id="err_{{ student[0] }}"></div>
                                </td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                    <div id="globalError" class="alert alert-danger d-none fw-bold">
                        ⚠️ Please fix the highlighted errors before saving.
                    </div>
                    <div class="d-flex justify-content-between mt-4">
                        <a href="/dashboard" class="btn btn-outline-secondary">← Cancel</a>
                        <button type="submit" class="btn btn-success px-5 fw-bold" onclick="return checkAll()">💾 Save Marks to Database</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script>
        function validateMark(input) {
            const val = input.value.trim().toUpperCase();
            const errDiv = document.getElementById('err_' + input.name);
            input.classList.remove('invalid-mark');
            errDiv.textContent = '';
            if (val === '' || val === 'AB') return true;
            if (!/^\d+$/.test(val)) {
                input.classList.add('invalid-mark');
                errDiv.textContent = '❌ Only numbers or AB allowed';
                return false;
            }
            const num = parseInt(val);
            if (num < 0) {
                input.classList.add('invalid-mark');
                errDiv.textContent = '❌ Mark cannot be negative';
                return false;
            }
            if (num > 50) {
                input.classList.add('invalid-mark');
                errDiv.textContent = '❌ Mark cannot exceed 50';
                return false;
            }
            return true;
        }
        function checkAll() {
            const inputs = document.querySelectorAll('.mark-input');
            let valid = true;
            inputs.forEach(inp => { if (!validateMark(inp)) valid = false; });
            if (!valid) document.getElementById('globalError').classList.remove('d-none');
            else document.getElementById('globalError').classList.add('d-none');
            return valid;
        }
    </script>
</body>
</html>
